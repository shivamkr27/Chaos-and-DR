apiVersion: v1
kind: Service
metadata:
  name: chaos-dr-app
  namespace: chaos-dr
  labels:
    app: chaos-dr-app
spec:
  type: NodePort
  selector:
    app: chaos-dr-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080   # accessible at <EC2-IP>:30080
