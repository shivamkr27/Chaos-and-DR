apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-dr-app
  namespace: chaos-dr
  labels:
    app: chaos-dr-app
spec:
  replicas: 2   # 2 replicas: meaningful for pod-kill chaos, fits in t3.micro 1 GB RAM
  selector:
    matchLabels:
      app: chaos-dr-app
  template:
    metadata:
      labels:
        app: chaos-dr-app
    spec:
      terminationGracePeriodSeconds: 30   # matches SIGTERM handler in app

      containers:
        - name: app
          image: PLACEHOLDER_IMAGE   # replaced per-region via kustomize overlay
          ports:
            - containerPort: 3000

          env:
            - name: PORT
              value: "3000"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "chaosdb"
            - name: DB_USER
              value: "postgres"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_HOST
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_PASSWORD
            - name: AWS_REGION
              value: "PLACEHOLDER_REGION"

          # Liveness — if this fails, pod is restarted
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          # Readiness — if this fails, pod is removed from Service endpoints
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

      # Spread pods across nodes to survive single-node failures
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: chaos-dr-app
