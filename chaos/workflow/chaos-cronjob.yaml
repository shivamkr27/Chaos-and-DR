# CronJob: runs the chaos workflow every 6 hours automatically.
# "I break it on purpose, every 6 hours, and measure recovery." — this is that.
#
# Schedule: 0 */6 * * *  →  00:00, 06:00, 12:00, 18:00 UTC daily
#
# To trigger manually:     kubectl create job --from=cronjob/chaos-schedule chaos-manual-$(date +%s) -n chaos-dr
# To pause the schedule:   kubectl patch cronjob chaos-schedule -n chaos-dr -p '{"spec":{"suspend":true}}'
# To resume:               kubectl patch cronjob chaos-schedule -n chaos-dr -p '{"spec":{"suspend":false}}'
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: chaos-schedule
  namespace: chaos-dr
  labels:
    app: chaos-schedule
spec:
  # Every 6 hours at minute 0: midnight, 6am, noon, 6pm UTC
  schedule: "0 */6 * * *"

  # Don't stack runs — if previous chaos is still running, skip this cycle
  concurrencyPolicy: Forbid

  # Keep last 3 successful and 3 failed job logs for debugging
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

  jobTemplate:
    spec:
      backoffLimit: 0    # no retries — chaos must be deliberate
      activeDeadlineSeconds: 1800   # kill if still running after 30 minutes

      template:
        spec:
          serviceAccountName: chaos-runner
          restartPolicy: Never

          containers:
            - name: workflow-runner
              image: bitnami/kubectl:latest
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -euo pipefail
                  NAMESPACE="chaos-dr"

                  log() { echo "[$(date -u +%H:%M:%SZ)] $1"; }

                  # Clean up any leftover ChaosEngines from previous run
                  log "Cleaning up previous chaos engines..."
                  kubectl delete chaosengine --all -n "$NAMESPACE" --ignore-not-found=true
                  kubectl delete chaosresult --all -n "$NAMESPACE" --ignore-not-found=true
                  sleep 10

                  log "Starting scheduled chaos workflow..."
                  kubectl create job \
                    --from=cronjob/chaos-schedule \
                    "chaos-$(date +%Y%m%d-%H%M)" \
                    -n "$NAMESPACE" || true

                  # Apply experiments in sequence
                  for exp in 01-pod-delete 02-network-latency 03-cpu-stress; do
                    log "Applying $exp..."
                    kubectl apply -f /experiments/${exp}.yaml

                    # Wait up to 4 minutes for each experiment
                    elapsed=0
                    while [ $elapsed -lt 240 ]; do
                      STATUS=$(kubectl get chaosengine "${exp%-*}-engine" \
                        -n "$NAMESPACE" -o jsonpath='{.status.engineStatus}' 2>/dev/null || echo "")
                      [ "$STATUS" = "completed" ] && break
                      sleep 10; elapsed=$((elapsed+10))
                    done

                    # Cooldown between experiments
                    log "$exp done. Cooling down 30s..."
                    sleep 30
                  done

                  log "Scheduled chaos cycle complete."

              volumeMounts:
                - name: experiments
                  mountPath: /experiments

          volumes:
            - name: experiments
              configMap:
                name: chaos-experiments
