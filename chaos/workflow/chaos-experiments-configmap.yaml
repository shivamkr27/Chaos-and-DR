# ConfigMap that bundles all experiment YAMLs so the workflow Job can apply them
# without needing a git clone inside the container.
# Recreate this with: kubectl create configmap chaos-experiments \
#   --from-file=chaos/experiments/ -n chaos-dr --dry-run=client -o yaml > this file
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: chaos-experiments
  namespace: chaos-dr
binaryData: {}
# The actual experiment YAML content is injected at deploy time via:
#   kubectl create configmap chaos-experiments \
#     --from-file=01-pod-delete.yaml=chaos/experiments/01-pod-delete.yaml \
#     --from-file=02-network-latency.yaml=chaos/experiments/02-network-latency.yaml \
#     --from-file=03-cpu-stress.yaml=chaos/experiments/03-cpu-stress.yaml \
#     --namespace chaos-dr \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# This placeholder is here so the CronJob definition below has something to reference.
data:
  placeholder: "run the kubectl command above after deploying"
