# LitmusChaos 2.x Operator — Installation Notes
#
# Use the 2.x operator (not 3.x Portal) — lighter, no MongoDB, API-compatible with
# all experiments in chaos/experiments/ (litmuschaos.io/v1alpha1).
#
# Install command (run on each K3s cluster):
#   kubectl apply -f https://litmuschaos.github.io/litmus/litmus-operator-v2.14.0.yaml
#
# After operator is up, apply RBAC and experiments:
#   kubectl apply -f chaos/install/chaosengine-rbac.yaml
#   kubectl apply -f chaos/experiments/01-pod-delete.yaml
#
# Verify operator is running:
#   kubectl get pods -n litmus
#
# The operator creates CRDs: ChaosEngine, ChaosExperiment, ChaosResult
# Experiments pull their runner images from hub.litmuschaos.io at runtime.
#
# Memory footprint of 2.x operator (fits on t3.micro):
#   chaos-operator-ce: ~30 MB
#   Total with runner pods: ~60-100 MB during experiment, ~30 MB idle
#
# NOTE: Do NOT install LitmusChaos 3.x (Helm chart with mongodb section).
# That version requires MongoDB (~512 MB) + multiple services → OOM on t3.micro.
