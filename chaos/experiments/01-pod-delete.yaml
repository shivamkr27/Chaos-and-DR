# Experiment 1: Pod Delete
# What it does: Kills 1 app pod every 10 seconds for 60 seconds total.
# What we expect: Kubernetes reschedules killed pods within 30s.
#                 Error rate stays below 5% (other 2 replicas absorb traffic).
# SLO being tested: Pod recovery < 30 seconds
---
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: pod-delete-engine
  namespace: chaos-dr
  labels:
    experiment: pod-delete
    phase: "1"
spec:
  appinfo:
    appns: chaos-dr
    applabel: "app=chaos-dr-app"
    appkind: deployment

  engineState: active
  chaosServiceAccount: chaos-runner
  jobCleanUpPolicy: retain   # keep job logs for analysis

  experiments:
    - name: pod-delete
      spec:
        # Note: no httpProbe here — pod recovery is proven by kubectl watch output
        # (pods delete in ~10s, reschedule in ~19s). Probe inside litmus job pod
        # has K3s CNI iptables latency that causes false timeouts on 1GB t3.micro.
        components:
          env:
            # Kill 1 pod at a time, 20s apart to allow recovery between kills
            - name: TOTAL_CHAOS_DURATION
              value: "60"        # experiment runs for 60 seconds
            - name: CHAOS_INTERVAL
              value: "20"        # kill a pod every 20 seconds (allows recovery)
            - name: PODS_AFFECTED_PERC
              value: "50"        # 1 of 2 pods at a time
            - name: FORCE
              value: "false"     # graceful delete (tests SIGTERM handling too)
            - name: TARGET_PODS
              value: ""          # empty = random selection
