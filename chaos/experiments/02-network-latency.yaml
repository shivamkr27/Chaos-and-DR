# Experiment 2: Network Latency
# What it does: Injects 300ms latency on all outbound traffic from app pods for 60 seconds.
# What we expect: App handles DB slowness without crashing.
#                 P99 latency increases but requests still complete.
#                 No 500 errors (timeouts should return 503, not 500).
# SLO being tested: Error rate < 5% even under 300ms network degradation
---
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: network-latency-engine
  namespace: chaos-dr
  labels:
    experiment: network-latency
    phase: "2"
spec:
  appinfo:
    appns: chaos-dr
    applabel: "app=chaos-dr-app"
    appkind: deployment

  engineState: active
  chaosServiceAccount: chaos-runner
  jobCleanUpPolicy: retain

  experiments:
    - name: pod-network-latency
      spec:
        probe:
          - name: app-latency-probe
            type: httpProbe
            httpProbe/inputs:
              url: "http://chaos-dr-app.chaos-dr.svc.cluster.local/health/ready"
              insecureSkipVerify: false
              responseTimeout: 5000   # 5 second timeout — must pass even with 300ms injected
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            mode: Continuous
            runProperties:
              probeTimeout: 6s
              interval: 10s
              attempt: 3

        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "60"
            - name: NETWORK_LATENCY
              value: "300"       # 300ms added to all outbound traffic
            - name: JITTER
              value: "50"        # ±50ms jitter — more realistic than fixed delay
            - name: PODS_AFFECTED_PERC
              value: "100"       # affect all pods — tests system-wide degradation
            - name: CONTAINER_RUNTIME
              value: "containerd"
            - name: SOCKET_PATH
              value: "/run/k3s/containerd/containerd.sock"
            - name: DESTINATION_HOSTS
              value: ""          # empty = all outbound (including DB)
            - name: DESTINATION_IPS
              value: ""
