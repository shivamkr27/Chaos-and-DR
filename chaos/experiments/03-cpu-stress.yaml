# Experiment 3: CPU Stress
# What it does: Maxes out CPU on app pods for 60 seconds.
# What we expect: HPA detects CPU > 60% and schedules additional pods.
#                 Existing requests continue to complete (slower but no errors).
#                 New pods come up within 90 seconds.
# SLO being tested: HPA scale-up within 90 seconds of CPU spike
---
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: cpu-stress-engine
  namespace: chaos-dr
  labels:
    experiment: cpu-stress
    phase: "3"
spec:
  appinfo:
    appns: chaos-dr
    applabel: "app=chaos-dr-app"
    appkind: deployment

  engineState: active
  chaosServiceAccount: chaos-runner
  jobCleanUpPolicy: retain

  experiments:
    - name: pod-cpu-hog
      spec:
        probe:
          # HPA probe: check that replica count grows during stress
          - name: hpa-scale-probe
            type: cmdProbe
            cmdProbe/inputs:
              command: >
                kubectl get hpa chaos-dr-app -n chaos-dr
                -o jsonpath='{.status.currentReplicas}' | xargs -I{} test {} -gt 2
              comparator:
                type: string
                criteria: ==
                value: ""    # exit 0 = success (replicas > 3)
              source: inline
            mode: EOT          # check once at End Of Test
            runProperties:
              probeTimeout: 10s
              attempt: 3

          # App health must stay OK throughout
          - name: app-health-probe
            type: httpProbe
            httpProbe/inputs:
              url: "http://chaos-dr-app.chaos-dr.svc.cluster.local/health/live"
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            mode: Continuous
            runProperties:
              probeTimeout: 5s
              interval: 10s
              attempt: 5

        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "120"       # 2 minutes — long enough for HPA to react
            - name: CPU_CORES
              value: "1"         # saturate 1 core (all we have on t2.micro)
            - name: PODS_AFFECTED_PERC
              value: "100"       # stress all pods simultaneously
            - name: CONTAINER_RUNTIME
              value: "containerd"
            - name: SOCKET_PATH
              value: "/run/k3s/containerd/containerd.sock"
