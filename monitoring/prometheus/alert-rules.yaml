apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: chaos-dr-alerts
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:

    # ── SLO: Availability ────────────────────────────────────────────────────
    - name: availability
      interval: 30s
      rules:
        # Pre-computed success rate — used by both alert and Grafana
        - record: job:http_request_success_rate:rate5m
          expr: |
            sum(rate(http_requests_total{status=~"2.."}[5m]))
            /
            sum(rate(http_requests_total[5m]))

        - alert: HighErrorRate
          expr: job:http_request_success_rate:rate5m < 0.995
          for: 1m
          labels:
            severity: critical
            slo: availability
          annotations:
            summary: "Error rate above SLO ({{ $value | humanizePercentage }} success)"
            description: >
              HTTP success rate dropped below 99.5% for 1 minute.
              This breaches the availability SLO.
              Current rate: {{ $value | humanizePercentage }}.
              Check Grafana chaos dashboard for active experiments.

        - alert: AppDown
          expr: |
            sum(up{job="chaos-dr-app"}) == 0
          for: 30s
          labels:
            severity: critical
            slo: availability
          annotations:
            summary: "All app pods are down"
            description: "Prometheus cannot scrape any chaos-dr-app pod. Region may be fully down."

    # ── SLO: Latency ─────────────────────────────────────────────────────────
    - name: latency
      interval: 30s
      rules:
        - record: job:http_request_duration_p99:rate5m
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
            )

        - alert: HighP99Latency
          expr: job:http_request_duration_p99:rate5m > 2
          for: 2m
          labels:
            severity: warning
            slo: latency
          annotations:
            summary: "P99 latency above 2s ({{ $value | humanizeDuration }})"
            description: >
              P99 response time has been above 2 seconds for 2 minutes.
              SLO target is < 2s under any chaos condition.
              Likely cause: network-latency experiment running, or DB under stress.

    # ── SLO: Pod Recovery ────────────────────────────────────────────────────
    - name: pod-recovery
      interval: 15s
      rules:
        - alert: PodRestartRateHigh
          expr: |
            increase(kube_pod_container_status_restarts_total{
              namespace="chaos-dr"
            }[5m]) > 5
          for: 0m    # fire immediately — too many restarts means something is wrong
          labels:
            severity: warning
            slo: pod_recovery
          annotations:
            summary: "Pod {{ $labels.pod }} restarted {{ $value }} times in 5 minutes"
            description: >
              High restart rate may indicate the pod is crash-looping, not just
              being killed by chaos. Check: kubectl logs {{ $labels.pod }} -n chaos-dr

        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas{namespace="chaos-dr"}
            !=
            kube_deployment_status_available_replicas{namespace="chaos-dr"}
          for: 2m
          labels:
            severity: warning
            slo: pod_recovery
          annotations:
            summary: "Deployment {{ $labels.deployment }} has fewer replicas than desired for 2m"
            description: >
              Expected {{ $labels.deployment }} to recover within 30s.
              Still not at desired replica count after 2 minutes — SLO breached.

    # ── SLO: HPA Scale ───────────────────────────────────────────────────────
    - name: hpa
      interval: 30s
      rules:
        - alert: HPANotScaling
          expr: |
            (
              kube_horizontalpodautoscaler_status_current_replicas{
                namespace="chaos-dr",
                horizontalpodautoscaler="chaos-dr-app"
              }
              ==
              kube_horizontalpodautoscaler_spec_min_replicas{
                namespace="chaos-dr",
                horizontalpodautoscaler="chaos-dr-app"
              }
            )
            and
            (
              avg(rate(container_cpu_usage_seconds_total{
                namespace="chaos-dr",
                container="app"
              }[2m])) > 0.06   # 60% of 100m CPU request
            )
          for: 3m
          labels:
            severity: warning
            slo: hpa_scale_time
          annotations:
            summary: "HPA not scaling despite high CPU for 3 minutes"
            description: >
              CPU has been above 60% for 3 minutes but HPA hasn't added pods.
              SLO target: scale-up within 90 seconds.
              Check: kubectl describe hpa chaos-dr-app -n chaos-dr

    # ── SLO: DB Replication Lag ──────────────────────────────────────────────
    - name: replication
      interval: 30s
      rules:
        - alert: ReplicationLagHigh
          expr: pg_replication_lag_seconds > 5
          for: 1m
          labels:
            severity: critical
            slo: regional_rpo
          annotations:
            summary: "PostgreSQL replication lag is {{ $value | humanizeDuration }}"
            description: >
              Replication lag above 5 seconds breaches RPO SLO.
              If primary fails now, up to {{ $value }}s of data could be lost.
              Investigate: slow queries on primary, network issues between regions.

    # ── Chaos Event Markers ──────────────────────────────────────────────────
    - name: chaos-events
      interval: 15s
      rules:
        # This becomes an annotation in Grafana — vertical line when chaos starts
        - alert: ChaosExperimentActive
          expr: |
            kube_job_status_active{
              namespace="chaos-dr",
              job_name=~"chaos-.*|.*-engine.*"
            } > 0
          for: 0m
          labels:
            severity: info
          annotations:
            summary: "Chaos experiment active: {{ $labels.job_name }}"
            description: "A chaos experiment is currently running. Expect elevated error rates or latency."
