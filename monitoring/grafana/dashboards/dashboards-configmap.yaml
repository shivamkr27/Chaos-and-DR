# Apply this to auto-load all 3 dashboards into Grafana on startup.
# Grafana sidecar watches ConfigMaps with label grafana_dashboard=1
# and imports them automatically — no manual clicking needed.
#
# Run: kubectl create configmap grafana-dashboards \
#        --from-file=monitoring/grafana/dashboards/01-system-overview.json \
#        --from-file=monitoring/grafana/dashboards/02-chaos-events.json \
#        --from-file=monitoring/grafana/dashboards/03-dr-failover.json \
#        --namespace monitoring \
#        --dry-run=client -o yaml \
#      | kubectl label --local -f - grafana_dashboard=1 -o yaml \
#      | kubectl apply -f -
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  # Content is injected by the kubectl command above.
  # This file documents the pattern — run the command after deploying.
  placeholder: "run kubectl create configmap command above"
