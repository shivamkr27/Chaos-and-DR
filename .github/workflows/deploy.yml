name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  build:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.sha.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate short SHA tag
        id: sha
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/chaos-dr-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/chaos-dr-app:${{ steps.sha.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Primary (us-east-1)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Rolling deploy on primary EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30s
          command_timeout: 150s
          script: |
            set -e

            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/chaos-dr-app:${{ needs.build.outputs.sha_tag }}"
            DEPLOY="deployment/chaos-dr-app"
            NS="chaos-dr"

            echo "==> Deploying: $IMAGE"
            kubectl set image "$DEPLOY" app="$IMAGE" -n "$NS"

            echo "==> Waiting for rollout..."
            kubectl rollout status "$DEPLOY" -n "$NS" --timeout=120s

            echo "==> Pods after deploy:"
            kubectl get pods -n "$NS" -l app=chaos-dr-app
